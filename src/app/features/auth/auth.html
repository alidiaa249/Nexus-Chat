<main class="min-h-screen flex flex-col md:flex-row w-full bg-[#faf8ff] text-[#131b2e] font-['Inter']">
  <!-- Left Panel: Brand & Illustration -->
  <section class="hidden md:flex md:w-[55%] relative overflow-hidden flex-col justify-center items-center bg-gradient-to-br from-[#eef0ff] via-[#dae2fd] to-[#faf8ff] p-12">
    <div class="absolute -top-32 -left-32 w-[500px] h-[500px] bg-[#3525cd]/10 rounded-full blur-[80px] pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-[#712ae2]/10 rounded-full blur-[60px] pointer-events-none"></div>
    <div class="w-full max-w-lg relative z-10 flex flex-col items-center">
      <img
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDygqCj6Zl8FLGsqUkqLKMJ0LpVb90joZmOXTlkTzF4ktDoP-BZ2_oA-WngcAAk0tUI28WStcnQte9fikjm0fV589bIKLv7Zg3UB8jzw1PJ2teZIjT00zvRDnzRxKYX0ZgC0TVU2BjZPx2_csKaoLAHsyoJ3W-CQxrdyEIbiaotTBMfdJi8w4-NC8etxa_loeUF7KlA-YkZhCdB0S3K1htUz0Iw79m6gPWpwefkPKFUVfUlfX3erPYbgA"
        alt="Nexus Chat connectivity illustration"
        class="w-full h-auto object-contain drop-shadow-2xl mb-12 hover:scale-105 transition-transform duration-700 ease-out"
      />
      <div class="text-center space-y-4">
        <h1 class="text-[32px] leading-[40px] tracking-[-0.01em] font-semibold text-[#131b2e]">
          Connect in <span class="text-[#3525cd]">Real-Time</span>
        </h1>
        <p class="text-[16px] leading-[24px] font-normal text-[#464555] max-w-sm mx-auto">
          Experience fluid, secure, and intuitive team communication designed for modern professionals.
        </p>
      </div>
    </div>
  </section>

  <!-- Right Panel: Authentication Card -->
  <section class="w-full md:w-[45%] min-h-screen flex items-center justify-center p-6 md:p-12 relative overflow-hidden">
    <div class="absolute inset-0 bg-[#faf8ff] md:hidden -z-10">
      <div class="absolute top-0 right-0 w-64 h-64 bg-[#3525cd]/5 rounded-full blur-3xl translate-x-1/3 -translate-y-1/3"></div>
    </div>

    <div class="w-full max-w-[420px] bg-[#faf8ff]/80 backdrop-blur-xl border border-[#c7c4d8]/40 shadow-[0_8px_32px_rgba(15,23,42,0.06)] rounded-[20px] p-8 relative z-10 transition-all duration-300">
      <!-- Mobile Logo -->
      <div class="flex md:hidden justify-center items-center gap-2 mb-8">
        <span class="material-symbols-outlined text-[#3525cd] text-[32px]" style="font-variation-settings: 'FILL' 1;">forum</span>
        <span class="text-[24px] leading-[32px] font-semibold text-[#131b2e]">Nexus Chat</span>
      </div>

      <!-- Tabs -->
      <div class="flex p-1 mb-8 bg-[#eaedff] rounded-lg border border-[#c7c4d8]/20">
        <button
          type="button"
          (click)="switchTab('signin')"
          class="flex-1 py-2.5 rounded-md text-[18px] leading-[24px] font-semibold transition-all duration-200"
          [class.bg-\[\#faf8ff\]]="activeTab() === 'signin'"
          [class.text-\[\#3525cd\]]="activeTab() === 'signin'"
          [class.shadow-sm]="activeTab() === 'signin'"
          [class.ring-1]="activeTab() === 'signin'"
          [class.ring-black\/5]="activeTab() === 'signin'"
          [class.text-\[\#464555\]]="activeTab() !== 'signin'"
        >
          Sign In
        </button>
        <button
          type="button"
          (click)="switchTab('signup')"
          class="flex-1 py-2.5 rounded-md text-[18px] leading-[24px] font-semibold transition-all duration-200"
          [class.bg-\[\#faf8ff\]]="activeTab() === 'signup'"
          [class.text-\[\#3525cd\]]="activeTab() === 'signup'"
          [class.shadow-sm]="activeTab() === 'signup'"
          [class.ring-1]="activeTab() === 'signup'"
          [class.ring-black\/5]="activeTab() === 'signup'"
          [class.text-\[\#464555\]]="activeTab() !== 'signup'"
        >
          Sign Up
        </button>
      </div>
@if (activeTab() === 'signin') {     <!-- Sign In Form -->
      <form  class="space-y-5" [formGroup]="loginform" (ngSubmit)="onSignIn()">
        <div class="space-y-1.5">
          <label class="block text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] ml-1">Email Address</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#777587]">mail</span>
            <input
              type="email"
              name="email"
              formControlName="email"
              placeholder="name@company.com"
              class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-[#c7c4d8] bg-white focus:border-[#3525cd] focus:ring-2 focus:ring-[#3525cd]/20 transition-all outline-none text-[14px] leading-[20px] text-[#131b2e]"
            />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="block text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] ml-1">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#777587]">lock</span>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              name="password"
              formControlName="password"
              placeholder="••••••••"
              class="w-full pl-12 pr-12 py-3.5 rounded-xl border border-[#c7c4d8] bg-white focus:border-[#3525cd] focus:ring-2 focus:ring-[#3525cd]/20 transition-all outline-none text-[14px] leading-[20px] text-[#131b2e]"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-[#777587] hover:text-[#131b2e] transition-colors"
            >
              <span class="material-symbols-outlined text-[20px]">
                {{ showPassword() ? 'visibility' : 'visibility_off' }}
              </span>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between pt-1 pb-2">
          <label class="flex items-center gap-2.5 cursor-pointer group">
            <input
              type="checkbox"
              name="remember"
              class="rounded border-[#c7c4d8] text-[#3525cd] focus:ring-[#3525cd] focus:ring-offset-0 w-4 h-4 transition-all"
            />
            <span class="text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] group-hover:text-[#131b2e] transition-colors">Remember me</span>
          </label>
          <a class="text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#3525cd] hover:text-[#4f46e5] transition-colors" href="#">Forgot Password?</a>
        </div>

        <button
          type="submit"
          class="w-full py-3.5 rounded-xl bg-[#3525cd] hover:bg-[#4d44e3] text-white text-[18px] leading-[24px] font-semibold shadow-[0_4px_14px_0_rgba(53,37,205,0.39)] hover:shadow-[0_6px_20px_rgba(53,37,205,0.23)] hover:-translate-y-0.5 transition-all duration-300"
        >
          Sign In
        </button>
      </form>}
 











@if (activeTab() === 'signup') {    
    <!-- Sign Up Form -->
      <form  class="space-y-4" (ngSubmit)="onSignUp()" [formGroup]="registerform">
        <div class="space-y-1.5">
          <label class="block text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] ml-1">Full Name</label>
          <input
            type="text"
            name="fullName"
            placeholder="Alex Rivers"
            formControlName="name"
            class="w-full px-4 py-3 rounded-xl border border-[#c7c4d8] bg-white focus:border-[#3525cd] focus:ring-2 focus:ring-[#3525cd]/20 transition-all outline-none text-[14px] leading-[20px] text-[#131b2e]"
          />
        </div>



        <div class="space-y-1.5">
          <label class="block text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] ml-1">Email Address</label>
          <input
            type="email"
            name="signupEmail"
            placeholder="alex@company.com"
            formControlName="email"
            class="w-full px-4 py-3 rounded-xl border border-[#c7c4d8] bg-white focus:border-[#3525cd] focus:ring-2 focus:ring-[#3525cd]/20 transition-all outline-none text-[14px] leading-[20px] text-[#131b2e]"
          />
        </div>

        <div class="space-y-1.5">
          <label class="block text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] ml-1">Password</label>
          <input
            type="password"
            name="signupPassword"
            placeholder="Create a strong password"
            formControlName="password"
            class="w-full px-4 py-3 rounded-xl border border-[#c7c4d8] bg-white focus:border-[#3525cd] focus:ring-2 focus:ring-[#3525cd]/20 transition-all outline-none text-[14px] leading-[20px] text-[#131b2e]"
          />
        </div>

        <div class="space-y-1.5">
          <label class="block text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] ml-1">Confirm Password</label>
          <input
            type="password"
            name="confirmPassword"

            placeholder="Repeat password"
            formControlName="rePassword"
            class="w-full px-4 py-3 rounded-xl border border-[#c7c4d8] bg-white focus:border-[#3525cd] focus:ring-2 focus:ring-[#3525cd]/20 transition-all outline-none text-[14px] leading-[20px] text-[#131b2e]"
          />
        </div>

        <button
          type="submit"
          class="w-full py-3.5 mt-2 rounded-xl bg-[#3525cd] hover:bg-[#4d44e3] text-white text-[18px] leading-[24px] font-semibold shadow-[0_4px_14px_0_rgba(53,37,205,0.39)] hover:shadow-[0_6px_20px_rgba(53,37,205,0.23)] hover:-translate-y-0.5 transition-all duration-300"
        >
          Create Account
        </button>

        <p class="text-center text-[12px] leading-[16px] tracking-[0.01em] font-medium text-[#464555] mt-4">
          By creating an account, you agree to our <a class="text-[#3525cd] hover:underline" href="#">Terms</a> &amp;
          <a class="text-[#3525cd] hover:underline" href="#">Privacy</a>.
        </p>
      </form>}

    </div>
  </section>
</main>
